name: Trigger Downstream Workflows

on:
  release:
    types: [published]

jobs:
  trigger-workflows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target_repo:
          - 'informatics-sa/TestWebsite'
          - 'informatics-sa/TestMath'
      fail-fast: false 

    steps:
      - name: Checkout downstream repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target_repo }}
          token: ${{ secrets.ORG_PAT }}
          path: repo-dir # This places the cloned repo into a folder named 'repo-dir'

      - name: Push empty commit
        run: |
          cd repo-dir
          
          # Set up git config (appears as a bot commit)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create the empty commit
          git commit --allow-empty -m "chore: trigger workflow from upstream release ${{ github.event.release.tag_name }}"
          
          # Push back to the repository
          git push
