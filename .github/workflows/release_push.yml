name: Trigger Downstream Workflows

on:
  release:
    types: [published]

jobs:
  trigger-workflows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target_repo:
          - 'informatics-sa/TestWebsite'
          - 'informatics-sa/TestMath'
      fail-fast: false 

    steps:
      - name: Push empty commit to ${{ matrix.target_repo }}
        run: |
          # Clone the repo using the PAT
          git clone https://x-access-token:${{ secrets.ORG_PAT }}@github.com/${{ matrix.target_repo }}.git repo-dir
          cd repo-dir
          
          # Set up git config (appears as a bot commit)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and push the empty commit
          git commit --allow-empty -m "auto: trigger workflow for release ${{ github.event.release.tag_name }}"
          git push origin main
